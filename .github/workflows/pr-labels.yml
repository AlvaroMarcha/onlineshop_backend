name: Auto Label PRs

on:
  pull_request:
    types: 
      - opened
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Add labels to PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
