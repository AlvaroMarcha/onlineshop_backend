name: PR Size Check

on:
  pull_request:
    types: 
      - opened
      - synchronize

permissions:
  pull-requests: write
  checks: write

jobs:
  check-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changedFiles = pr.changed_files;
            const totalLines = additions + deletions;
            
            console.log(`Lines changed: ${totalLines} (${additions} additions, ${deletions} deletions)`);
            console.log(`Files changed: ${changedFiles}`);
            
            // Skip size check for develop → main/master production syncs
            if ((pr.base.ref === 'main' || pr.base.ref === 'master') && pr.head.ref === 'develop') {
              console.log('Skipping PR size check for develop → main/master sync');
              
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'PR Size Check',
                head_sha: pr.head.sha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'PR Size Check - Skipped',
                  summary: 'Production sync PR - size check skipped',
                  text: `This is a develop → ${pr.base.ref} sync PR with ${totalLines} lines across ${changedFiles} files. Size checks are not enforced for production deployments.`,
                },
              });
              
              return;
            }
            
            // Get list of changed files to check if it's infrastructure/CI-CD PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            
            // Check if this is primarily a CI/CD or infrastructure PR
            const infraFiles = files.filter(file => 
              file.filename.startsWith('.github/workflows/') ||
              file.filename.startsWith('.github/') ||
              file.filename.includes('docker-compose') ||
              file.filename === 'Dockerfile' ||
              file.filename.startsWith('nginx/') ||
              file.filename.endsWith('.sh') ||
              file.filename.endsWith('.ps1')
            );
            
            const isInfraPR = infraFiles.length > 0 && (infraFiles.length / files.length) > 0.5;
            
            // Adjust limits for infrastructure PRs
            const largeLimit = isInfraPR ? 1000 : 500;
            const xlLimit = isInfraPR ? 2500 : 1000;
            const fileLimit = isInfraPR ? 150 : 100;
            
            console.log(`Infrastructure PR: ${isInfraPR}`);
            console.log(`Limits - Large: ${largeLimit}, XL: ${xlLimit}, Files: ${fileLimit}`);
            
            // Remove existing size labels
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            
            const sizeLabels = labels.filter(label => label.name.startsWith('size/'));
            for (const label of sizeLabels) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: label.name,
              });
            }
            
            // Determine size and action
            let size = 'small';
            let shouldWarn = false;
            let shouldBlock = false;
            
            if (totalLines > xlLimit || changedFiles > fileLimit) {
              size = 'xl';
              shouldBlock = true;
            } else if (totalLines > largeLimit || changedFiles > 50) {
              size = 'large';
              shouldWarn = true;
            }
            
            // Add appropriate label
            if (size !== 'small') {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [`size/${size}`],
              });
            }
            
            // Add comment if warning or blocking
            if (shouldWarn || shouldBlock) {
              const infraNote = isInfraPR ? '\n\n_Nota: Este PR modifica principalmente archivos de CI/CD o infraestructura, por lo que se aplican límites más flexibles._' : '';
              const message = shouldBlock 
                ? `⚠️ **Este PR es demasiado grande** (${totalLines} líneas, ${changedFiles} archivos)\n\n` +
                  `Se recomienda dividirlo en PRs más pequeños para facilitar la revisión.\n\n` +
                  `**El merge está bloqueado hasta que se reduzca el tamaño.**${infraNote}`
                : `⚠️ **Este PR es grande** (${totalLines} líneas, ${changedFiles} archivos)\n\n` +
                  `Considera dividirlo en PRs más pequeños si es posible para facilitar la revisión.${infraNote}`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message,
              });
            }
            
            // Create check run
            const conclusion = shouldBlock ? 'failure' : 'success';
            const infraLabel = isInfraPR ? ' (Infrastructure PR - extended limits)' : '';
            const summary = shouldBlock 
              ? `PR demasiado grande: ${totalLines} líneas, ${changedFiles} archivos${infraLabel}`
              : `PR size OK: ${totalLines} líneas, ${changedFiles} archivos${infraLabel}`;
            
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'PR Size Check',
              head_sha: pr.head.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: 'PR Size Check',
                summary: summary,
                text: `Lines: ${additions} additions, ${deletions} deletions\nFiles: ${changedFiles}`,
              },
            });
            
            if (shouldBlock) {
              core.setFailed('PR size exceeds limits');
            }
