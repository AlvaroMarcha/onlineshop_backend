name: Auto-merge to main

on:
  pull_request_review:
    types: 
      - submitted
  check_suite:
    types: 
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge develop to main
    runs-on: ubuntu-latest
    
    # Only run when PR from develop to main
    if: |
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'develop' &&
      github.event.pull_request.draft == false
    
    steps:
      - name: Check PR approval and status
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Check if PR is approved
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            
            const approvedReviews = reviews.filter(review => review.state === 'APPROVED');
            
            if (approvedReviews.length === 0) {
              console.log('PR has no approvals');
              return { shouldMerge: false };
            }
            
            // Check if all required checks passed
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });
            
            const failedChecks = checkRuns.check_runs.filter(check => 
              check.conclusion === 'failure' || check.conclusion === 'cancelled'
            );
            
            if (failedChecks.length > 0) {
              console.log('Some checks failed:', failedChecks.map(c => c.name));
              return { shouldMerge: false };
            }
            
            console.log('All conditions met for auto-merge');
            return { shouldMerge: true };
        
      - name: Enable auto-merge
        if: fromJSON(steps.check.outputs.result).shouldMerge == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto \
            --merge \
            --repo ${{ github.repository }}
