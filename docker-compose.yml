version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: marcha-mysql
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - marcha-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marcha-backend
    env_file:
      - .env
    # Puerto 8080 ya no se expone directamente, nginx hace de proxy
    expose:
      - "8080"
    volumes:
      - ./uploads:/uploads
    restart: always
    depends_on:
      - mysql
    networks:
      - marcha-network

  nginx:
    image: nginx:alpine
    container_name: marcha-nginx
    restart: always
    ports:
      - "80:80"        # HTTP
      # - "443:443"    # HTTPS (descomentar cuando tengas SSL)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/uploads:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - marcha-network

networks:
  marcha-network:
    driver: bridge

volumes:
  mysql_data:
  nginx_logs:
