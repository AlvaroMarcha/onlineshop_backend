# Configuración de Nginx para Deploy en Render
# Render detecta automáticamente Docker y ejecuta docker-compose.yml
# Esta configuración es idéntica a nginx.conf pero optimizada para producción

events {
    worker_connections 2048;  # Más conexiones para producción
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Formato de logs mejorado para producción
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Optimizaciones de rendimiento
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    client_max_body_size 50M;
    server_tokens off;  # Ocultar versión de nginx
    
    # Compresión gzip optimizada
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    
    # Rate limiting para producción
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    
    # Upstream - Spring Boot backend
    upstream spring_backend {
        server app:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;  # Mantener conexiones abiertas
    }
    
    # Servidor HTTP (puerto 80)
    # Render proporciona HTTPS automáticamente, este es el backend
    server {
        listen 80;
        server_name _;  # Acepta cualquier dominio
        
        # Headers de seguridad para producción
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS se añade por Render automáticamente
        
        # Real IP desde Render
        set_real_ip_from 10.0.0.0/8;
        set_real_ip_from 172.16.0.0/12;
        set_real_ip_from 192.168.0.0/16;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;
        
        # Health check (sin rate limiting)
        location /health/status {
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }
        
        # API endpoints con rate limiting
        location /api/ {
            limit_req zone=api_limit burst=100 nodelay;
            
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Headers importantes para Spring Boot
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts optimizados para producción
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering para uploads
            proxy_buffering off;
            proxy_request_buffering off;
        }
        
        # Auth endpoints con rate limiting estricto
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth_limit burst=5 nodelay;
            
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Uploads de archivos (imágenes de productos)
        location /uploads/ {
            alias /uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }
        
        # Archivos estáticos de Spring Boot
        location /static/ {
            proxy_pass http://spring_backend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Root - redirigir al backend
        location / {
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Bloquear acceso a archivos sensibles
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # Bloquear acceso a archivos de backup
        location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
