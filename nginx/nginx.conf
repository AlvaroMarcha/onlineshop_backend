# Configuración de Nginx como reverse proxy para Spring Boot
# Puerto interno: Spring Boot en 8080 (container) o localhost:8080 (local)
# Puerto externo: Nginx en 80 (HTTP) y 443 (HTTPS)

events {
    worker_connections 1024;
}

http {
    # Configuración básica
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Optimizaciones
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;  # Para uploads de imágenes de productos
    
    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    
    # Rate limiting (prevenir abuso)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    
    # Upstream - Spring Boot backend
    upstream spring_backend {
        # Para Docker: usar nombre del servicio
        server app:8080 max_fails=3 fail_timeout=30s;
        
        # Para local (comentar línea anterior y descomentar esta):
        # server host.docker.internal:8080 max_fails=3 fail_timeout=30s;
    }
    
    # Servidor HTTP (puerto 80)
    # Redirige automáticamente a HTTPS
    server {
        listen 80;
        server_name alanmarcha.com www.alanmarcha.com;
        
        # Redirigir a HTTPS en producción
        return 301 https://$server_name$request_uri;
        
        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # CORS headers (opcional si ya lo maneja Spring)
        # add_header Access-Control-Allow-Origin "$http_origin" always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        # add_header Access-Control-Allow-Credentials "true" always;
        
        # Health check endpoint (sin rate limiting)
        location /health/status {
            proxy_pass http://spring_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }
        
        # API endpoints con rate limiting
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            
            # Headers importantes para Spring Boot
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support (si se necesita en el futuro)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings para uploads
            proxy_buffering off;
            proxy_request_buffering off;
        }
        
        # Auth endpoints con rate limiting estricto
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth_limit burst=3 nodelay;
            
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Uploads de archivos (imágenes de productos)
        location /uploads/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
        
        # Archivos estáticos de Spring Boot
        location /static/ {
            proxy_pass http://spring_backend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Root - redirigir al backend
        location / {
            proxy_pass http://spring_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Bloquear acceso a archivos sensibles
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
    
    # Servidor HTTPS (puerto 443) - PRODUCCIÓN
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name alanmarcha.com www.alanmarcha.com;
        
        # Certificados SSL (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/alanmarcha.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/alanmarcha.com/privkey.pem;
        
        # Configuración SSL moderna (A+ en SSL Labs)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # HSTS (15768000 seconds = 6 months)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;
        
        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Health check endpoint (sin rate limiting)
        location /health/status {
            proxy_pass http://spring_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }
        
        # API endpoints con rate limiting
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            
            # Headers importantes para Spring Boot
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support (si se necesita en el futuro)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings para uploads
            proxy_buffering off;
            proxy_request_buffering off;
        }
        
        # Auth endpoints con rate limiting estricto
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth_limit burst=3 nodelay;
            
            proxy_pass http://spring_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Uploads de archivos (imágenes de productos)
        location /uploads/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
        
        # Archivos estáticos de Spring Boot
        location /static/ {
            proxy_pass http://spring_backend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Root - redirigir al backend
        location / {
            proxy_pass http://spring_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Bloquear acceso a archivos sensibles
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
