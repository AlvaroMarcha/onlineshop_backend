# ===========================================================================
# Configuración de propiedades para tests
# Reemplaza application.properties principal en el classpath de tests
# ===========================================================================

spring.application.name=backend_template_web

# ---------------------------------------------------------------------------
# DataSource — H2 en memoria (todos los tests: @DataJpaTest + @WebMvcTest)
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ---------------------------------------------------------------------------
# Server / Web
# ---------------------------------------------------------------------------
server.port=8080
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# ---------------------------------------------------------------------------
# Rutas de ficheros (valores dummy para que los beans arranquen)
# ---------------------------------------------------------------------------
app.images.storage-path=/tmp/test-images
app.base-url=http://localhost:8080
app.images.public-path=/images
app.frontend-url=http://localhost:4200
app.invoices.storage-path=/tmp/test-invoices

