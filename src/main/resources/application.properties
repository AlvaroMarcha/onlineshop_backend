spring.application.name=backend_template_web
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=${DB_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${DB_HBM2DDL:update}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl


server.port=${SERVER_PORT:8080}
app.images.storage-path=${IMAGES_STORAGE_PATH}
# Límite por fichero: 5 MB. Límite por petición: 50 MB (soporta galería de hasta ~5 imágenes)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB
app.base-url=${APP_BASE_URL}
app.images.public-path=${APP_IMAGES_PUBLIC_PATH}
app.frontend-url=${APP_FRONTEND_URL}
spring.jackson.serialization.write-dates-as-timestamps=false

# =========================
# Mail
# =========================
app.mail.username=${MAIL_USERNAME}

# =========================
# Google OAuth2 (for Gmail SMTP via XOAUTH2)
# =========================
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.google.token-uri=${GOOGLE_TOKEN_URI}
app.google.refresh-token=${GOOGLE_REFRESH_TOKEN}

# =========================
# Invoices
# =========================
app.invoices.storage-path=${INVOICES_STORAGE_PATH:${app.images.storage-path}}

# =========================
# Company
# =========================
app.company.name=${COMPANY_NAME}
app.company.nif=${COMPANY_NIF}
app.company.address=${COMPANY_ADDRESS}
app.company.email=${COMPANY_EMAIL}
app.company.phone=${COMPANY_PHONE}
app.company.iban=${COMPANY_IBAN}
app.company.primary-color=${COMPANY_PRIMARY_COLOR}
app.company.secondary-color=${COMPANY_SECONDARY_COLOR}
app.company.accent-color=${COMPANY_ACCENT_COLOR}
app.company.text-color=${COMPANY_TEXT_COLOR}
app.company.logo-path=${COMPANY_LOGO_PATH}

# =========================
# Stripe
# =========================
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.currency=${STRIPE_CURRENCY}

# =========================
# JWT
# =========================
# Access token: 60 minutos = 3 600 000 ms
jwt.access-token.expiration-ms=3600000
# Refresh token: 30 dias (gestionado en RefreshTokenService)
jwt.refresh-token.expiration-days=30

# =========================
# Terms & Conditions
# =========================
app.terms.current-version=1.0
