spring.application.name=backend_template_web
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.database-platform=${DB_DIALECT}
spring.jpa.show-sql=${DB_SHOW_SQL}
spring.jpa.hibernate.ddl-auto=${DB_HBM2DDL}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl


server.port=${SERVER_PORT:8080}
app.images.storage-path=${IMAGES_STORAGE_PATH}
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
app.base-url=${APP_BASE_URL}
app.images.public-path=${APP_IMAGES_PUBLIC_PATH}
spring.jackson.serialization.write-dates-as-timestamps=false

# =========================
# Mail
# =========================
app.mail.username=${MAIL_USERNAME}

# =========================
# Google OAuth2 (for Gmail SMTP via XOAUTH2)
# =========================
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.google.token-uri=${GOOGLE_TOKEN_URI}
app.google.refresh-token=${GOOGLE_REFRESH_TOKEN}
